<div class="filter-data-wrapper">
  <div class="module-nav-tabs">
    <a [routerLink]="['/']" class="link-tab">Home</a>
    <a [routerLink]="['/taskboard']" class="link-tab">Taskboard</a>
    <a [routerLink]="['/filterdata']" class="link-tab link-tab-active">Filter Data</a>
  </div>
  <div class="filter-data-header">
    <button mat-raised-button color="primary" (click)="openCityDialog()" class="filter-empcode-btn">Filter Empcode</button>
  </div>
  <div class="filter-data-section">
    <table mat-table [dataSource]="taskBoardData" class="mat-elevation-z8" width="100%">
        <ng-container matColumnDef="sno">
          <th mat-header-cell *matHeaderCellDef>Sno</th>
          <td mat-cell *matCellDef="let element"> {{element.id}} </td>
        </ng-container>
        <ng-container matColumnDef="empCode">
          <th mat-header-cell *matHeaderCellDef> EmpCode </th>
          <td mat-cell *matCellDef="let element"> {{element.empCode}} </td>
        </ng-container>
         <ng-container matColumnDef="fullname">
           <th mat-header-cell *matHeaderCellDef> FullName </th>
           <td mat-cell *matCellDef="let element"> {{element.fullname}} </td>
         </ng-container>
        <ng-container matColumnDef="dept">
          <th mat-header-cell *matHeaderCellDef> Dept </th>
          <td mat-cell *matCellDef="let element"> {{element.dept}} </td>
        </ng-container>
        <ng-container matColumnDef="salary">
           <th mat-header-cell *matHeaderCellDef> Salary </th>
           <td mat-cell *matCellDef="let element"> {{element.salary}} </td>
         </ng-container>
    
        <ng-container matColumnDef="age">
          <th mat-header-cell *matHeaderCellDef> Age </th>
          <td mat-cell *matCellDef="let element"> {{element.age}} </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
    </table>
  </div>
</div>
 <ng-template let-data #myCityDialog>
  <mat-dialog-content  class="add-employee-popup">
    <mat-card>
          <mat-card-content>
            <form class="form-container" [formGroup]="employeeForm" >
              <div>
                <mat-form-field appearance="outline" class="field-select-type">
                  <mat-label>Select type</mat-label>
                  <mat-select formControlName="type">
                    <mat-option *ngFor="let framework of filterTypes" [value]="framework">
                    {{ framework }}
                   </mat-option>
                  </mat-select>
                </mat-form-field>
               </div>
               <div class="empty-code-field">
                 <mat-label class="form-label">Empcode</mat-label>
                 <mat-form-field class="empty-code-inp full-width">
                   <input formControlName="empCode" matInput (input)="onEmpCodeChange($event)" placeholder="Type to filter...">
                 </mat-form-field>
               </div>
         </form>
           </mat-card-content>
          <mat-card-actions>
            <button (click)="onSubmit()" mat-raised-button color="primary" class="btn-submit" [disabled]="isLoading || employeeForm.invalid">
              <span *ngIf="isLoading" class="spinner-container">
                <mat-spinner diameter="20"></mat-spinner>
              </span>
              {{ isLoading ? 'Filtering...' : 'Submit' }}
            </button>
            <button mat-raised-button class="btn-submit" (click)="close()" [disabled]="isLoading">Close</button>
          </mat-card-actions>
    </mat-card>
  </mat-dialog-content>
        
   
  
</ng-template>
