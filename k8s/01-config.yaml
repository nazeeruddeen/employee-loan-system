apiVersion: v1
kind: Secret
metadata:
  name: loan-db-secret
  namespace: loan-system
type: Opaque
stringData:
  mysql-root-password: root
  mysql-username: root
  mysql-password: root
  mysql-app-username: loanapp
  mysql-app-password: loanapp123
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loan-db-config
  namespace: loan-system
data:
  mysql-database: employee_loan_system
  spring-datasource-url: jdbc:mysql://mysql:3306/employee_loan_system?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
