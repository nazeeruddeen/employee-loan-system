apiVersion: apps/v1
kind: Deployment
metadata:
  name: loan-frontend
  namespace: loan-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loan-frontend
  template:
    metadata:
      labels:
        app: loan-frontend
    spec:
      containers:
        - name: loan-frontend
          image: loan-system/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: loan-frontend
  namespace: loan-system
spec:
  selector:
    app: loan-frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      nodePort: 30080
  type: NodePort
