server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/employee_loan_system?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

logging:
  level:
    com.employee.loan_system: DEBUG
    org.springframework.web: DEBUG

cors:
  allowed-origins: http://localhost:4200
